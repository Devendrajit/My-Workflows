name: CICD
on:
  workflow_dispatch:
    inputs:
      environment:
        description: This is the environment value where the workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "running first step- code"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build docker container
        run: echo "building docker image and ..."
  deploy:
    if : inputs.environment == 'dev'
    needs: [code,build]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to webserver
        run: echo "deplyoing this on webserver..............."

    
  
